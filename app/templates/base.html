<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}WLED Scheduler{% endblock %}</title>
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.dataset.theme='light'</script>
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
  <script defer src="{{ url_for('static', path='js/alpine.min.js') }}"></script>
  <script src="{{ url_for('static', path='js/htmx.min.js') }}"></script>
  <script src="{{ url_for('static', path='js/api.js') }}"></script>
</head>
<body hx-history="false">
  <div class="app">
    <main class="main">
      {% block content %}{% endblock %}
    </main>
    <nav class="tabbar" hx-boost="true" hx-replace-url="true">
      <a class="tabbar__link {% if active_page == 'devices' %}is-active{% endif %}" href="/devices">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>
        Devices
      </a>
      <a class="tabbar__link {% if active_page == 'schedules' %}is-active{% endif %}" href="/schedules">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        Schedules
      </a>
      <a class="tabbar__link {% if active_page == 'history' %}is-active{% endif %}" href="/history">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l4 2"/></svg>
        History
      </a>
      <a class="tabbar__link {% if active_page == 'settings' %}is-active{% endif %}" href="/settings">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        Settings
      </a>
    </nav>
  </div>
  <div class="toast-region" id="toast-region"></div>
  {% block scripts %}{% endblock %}
</body>
</html>
