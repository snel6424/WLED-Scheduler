{% extends "base.html" %}
{% block title %}Schedules · WLED Scheduler{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>Schedules</h1>
    <p>Automate your lights.</p>
  </div>
  <a class="btn--fab" href="/schedules/new" aria-label="New schedule">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </a>
</div>

<div class="filter-row" id="filter-row">
  <button class="filter-pill is-active" data-filter="all">All</button>
  <button class="filter-pill" data-filter="active">Active</button>
  <button class="filter-pill" data-filter="inactive">Inactive</button>
  <button class="filter-pill" data-filter="sun">Sunrise / Sunset</button>
</div>

<div class="list" id="schedule-list"></div>

<div class="info-card">
  <div class="info-card__icon">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
  </div>
  <div>
    <h3>Schedules run automatically</h3>
    <p>Your lights will turn on and off at the scheduled times.</p>
  </div>
  <div class="info-card__decoration">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6Z"/></svg>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/icons.js') }}"></script>
<script src="{{ url_for('static', path='js/schedules.js') }}"></script>
{% endblock %}
