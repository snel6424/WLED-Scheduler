{% extends "base.html" %}
{% block title %}History · WLED Scheduler{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>History</h1>
    <p>All past actions across your lights.</p>
  </div>
</div>

<div class="field-row" style="margin-bottom: 1.5rem;">
  <div class="field">
    <label for="range-select">Date</label>
    <select id="range-select" name="since"
            hx-get="/fragments/history/entries"
            hx-trigger="change"
            hx-target="#history-groups"
            hx-swap="innerHTML"
            hx-include="#device-filter">
      <option value="7">Last 7 days</option>
      <option value="30">Last 30 days</option>
      <option value="all">All time</option>
    </select>
  </div>
  <div class="field">
    <label for="device-filter">Device</label>
    <select id="device-filter" name="device_id"
            hx-get="/fragments/history/entries"
            hx-trigger="change"
            hx-target="#history-groups"
            hx-swap="innerHTML"
            hx-include="#range-select">
      <option value="">All Devices</option>
      {% for device in devices %}
      <option value="{{ device.id }}"{% if device.id == device_id %} selected{% endif %}>{{ device.name }}</option>
      {% endfor %}
    </select>
  </div>
</div>

<div id="history-groups"
     hx-get="/fragments/history/entries"
     hx-trigger="load"
     hx-include="#range-select, #device-filter"></div>

<button id="load-more-btn" class="btn" style="width:100%; margin-top:1rem;" hidden>Load more</button>
{% endblock %}
